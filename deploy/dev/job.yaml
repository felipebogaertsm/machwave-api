apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: machwave-worker-dev
spec:
  template:
    spec:
      template:
        spec:
          serviceAccountName: machwave-api-dev@machwave.iam.gserviceaccount.com
          maxRetries: 1
          timeoutSeconds: 3600
          containers:
            - image: IMAGE_PLACEHOLDER
              env:
                - name: GCP_PROJECT_ID
                  value: machwave
                - name: GCS_BUCKET_NAME
                  value: machwave-data-dev
                - name: FIREBASE_PROJECT_ID
                  value: machwave-dev
              resources:
                limits:
                  cpu: "2"
                  memory: 2Gi
