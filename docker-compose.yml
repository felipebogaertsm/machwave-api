services:
  pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command: >-
      gcloud beta emulators pubsub start
      --host-port=0.0.0.0:8085
      --project=machwave-dev
    ports:
      - "8085:8085"

  pubsub-init:
    image: curlimages/curl:8.10.1
    depends_on:
      pubsub:
        condition: service_started
    volumes:
      - ./scripts/init-pubsub-emulator.sh:/init.sh:ro
    environment:
      EMULATOR_HOST: pubsub:8085
      PROJECT: machwave-dev
      TOPIC: machwave-simulations
      SUBSCRIPTION: machwave-simulations-push
      PUSH_ENDPOINT: http://worker:8080/pubsub/push
    entrypoint: ["sh", "/init.sh"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./sa-key.json:/run/secrets/sa-key.json:ro
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/sa-key.json
    ports:
      - "8001:8080"
    command: uvicorn app.worker.server:app --host 0.0.0.0 --port 8080 --reload

  api:
    build: .
    ports:
      - "8000:8080"
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./sa-key.json:/run/secrets/sa-key.json:ro
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/sa-key.json
      CORS_ORIGINS: "http://localhost:3000"
      PUBSUB_EMULATOR_HOST: pubsub:8085
      GCP_PROJECT_ID: machwave-dev
      PUBSUB_TOPIC: machwave-simulations
    depends_on:
      pubsub-init:
        condition: service_completed_successfully
      worker:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
